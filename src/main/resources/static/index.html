<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Agent</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #7FA9D9, #ff66b2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .hero {
        background: white;
        padding: 48px 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 480px;
    }

    h1 {
        color: #333;
        margin-bottom: 12px;
    }

    p {
        color: #666;
        margin-bottom: 28px;
        line-height: 1.5;
    }

    a.cta {
        display: inline-block;
        padding: 14px 32px;
        background: #ff66b2;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
        transition: opacity 0.2s;
    }

    a.cta:hover {
        opacity: 0.9;
    }
</style>
</head>
<body>

<div class="hero">
    <h1>Meet Your AI Agent</h1>
    <p>A lightweight AI-powered chat assistant built with Spring AI and Ollama. Ask anything and get instant responses.</p>
    <a class="cta" href="/chat.html">Start Chatting</a>
</div>

</body>
</html>
